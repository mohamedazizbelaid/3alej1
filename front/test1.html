<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediRendez-vous · Connexion</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #e9f0f9 0%, #dbe5f0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .main-card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 50px -10px rgba(0,50,80,0.25), 0 0 0 1px rgba(156, 188, 226, 0.3);
      width: 100%;
      max-width: 1000px;
      display: flex;
      flex-wrap: wrap;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* panneau gauche (brand) */
    .brand-panel {
      flex: 1 1 280px;
      background: linear-gradient(135deg, #1c3f5c, #143649);
      color: white;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 400px;
    }

    .brand-header h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .brand-header h1 i {
      color: #5fc1b0;
      margin-right: 8px;
    }

    .brand-header .tagline {
      font-size: 1rem;
      opacity: 0.75;
      font-weight: 400;
      border-left: 3px solid #5fc1b0;
      padding-left: 1rem;
      margin-top: 1rem;
    }

    .brand-features {
      margin: 2rem 0;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.2rem;
      font-weight: 300;
      opacity: 0.9;
    }

    .feature-item i {
      font-size: 1.2rem;
      width: 28px;
      color: #7fd9c8;
    }

    .brand-footer {
      font-size: 0.85rem;
      opacity: 0.5;
      display: flex;
      gap: 1rem;
    }

    /* panneau droit (formulaires) */
    .form-panel {
      flex: 1.2 1 400px;
      background: white;
      padding: 2.5rem 2.2rem;
    }

    /* titre unique - seulement Connexion */
    .form-header {
      margin-bottom: 2rem;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 0.8rem;
    }

    .form-header h2 {
      font-size: 1.8rem;
      font-weight: 600;
      color: #1c3f5c;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-header h2 i {
      color: #1e7b6f;
    }

    /* formulaire container */
    .form-container {
      transition: opacity 0.2s ease;
    }

    .form-card {
      display: block;
    }

    .form-card.hidden {
      display: none;
    }

    .input-group {
      margin-bottom: 1.4rem;
    }

    .input-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #1f3a4b;
      margin-bottom: 6px;
    }

    .input-group label i {
      color: #1e7b6f;
      width: 18px;
    }

    .input-field {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 1.5px solid #dee7ef;
      border-radius: 18px;
      font-size: 0.95rem;
      transition: 0.15s;
      background: #f9fcff;
    }

    .input-field:focus {
      border-color: #1e7b6f;
      outline: none;
      background: white;
      box-shadow: 0 0 0 4px rgba(30, 123, 111, 0.1);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.9rem;
      margin: 1rem 0 1.5rem;
    }

    .checkbox-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #2c4a5e;
    }

    .forgot-link {
      background: none;
      border: none;
      color: #1e7b6f;
      font-weight: 500;
      cursor: pointer;
      text-decoration: underline dotted;
      text-underline-offset: 3px;
    }

    .btn-primary {
      width: 100%;
      background: #1e3b4f;
      border: none;
      padding: 1rem;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 18px -6px rgba(20, 60, 80, 0.3);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-primary:hover {
      background: #143649;
      transform: scale(1.01);
    }

    .btn-secondary {
      background: transparent;
      border: 1.5px solid #1e7b6f;
      color: #1e7b6f;
      border-radius: 40px;
      padding: 0.8rem;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 1rem;
    }

    .btn-secondary:hover {
      background: #e4f2f0;
    }

    .btn-link {
      background: none;
      border: none;
      color: #1e7b6f;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .info-message {
      background: #f0f9ff;
      padding: 1rem;
      border-radius: 24px;
      font-size: 0.9rem;
      border: 1px solid #cde3f0;
      color: #1f4b6e;
      margin: 1.5rem 0 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .info-message i {
      color: #1e7b6f;
      font-size: 1.3rem;
    }

    .switch-container {
      text-align: center;
      margin-top: 1.5rem;
    }

    @media (max-width: 680px) {
      .main-card {
        flex-direction: column;
        border-radius: 2rem;
      }
      .brand-panel {
        min-height: auto;
        padding: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="main-card">
    <!-- partie gauche (présentation) -->
    <div class="brand-panel">
      <div class="brand-header">
        <h1><i class="fas fa-notes-medical"></i> MediRendez-vous</h1>
        <div class="tagline">Gestion simplifiée des consultations</div>
      </div>
      <div class="brand-features">
        <div class="feature-item"><i class="fas fa-calendar-check"></i> Prise de rendez-vous 24h/24</div>
        <div class="feature-item"><i class="fas fa-user-md"></i> Planning médecins temps réel</div>
        <div class="feature-item"><i class="fas fa-bell"></i> Rappels automatiques</div>
        <div class="feature-item"><i class="fas fa-lock"></i> Sécurité des données santé</div>
      </div>
      <div class="brand-footer">
        <span><i class="far fa-clock"></i> Démo interactive</span>
        <span>v2.1.0</span>
      </div>
    </div>

    <!-- partie droite (formulaires dynamiques) -->
    <div class="form-panel">
      <!-- titre uniquement "Connexion" -->
      <div class="form-header">
        <h2><i class="fas fa-sign-in-alt"></i> Connexion</h2>
      </div>

      <!-- formulaire de connexion -->
      <div id="loginForm" class="form-card">
        <div class="input-group">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" class="input-field" id="loginEmail" placeholder="exemple@cabinet.fr">
        </div>
        <div class="input-group">
          <label><i class="fas fa-lock"></i> Mot de passe</label>
          <input type="password" class="input-field" id="loginPassword" placeholder="••••••••">
        </div>
        <div class="checkbox-row">
          <label><input type="checkbox"> Se souvenir de moi</label>
          <button class="forgot-link" id="forgotPasswordBtn" onclick="window.location.href='test2.html'">Mot de passe oublié ?</button>
        </div>
        <button class="btn-primary" id="doLoginBtn"><i class="fas fa-arrow-right-to-bracket"></i> Connexion</button>
        
        <!-- Bouton pour créer un compte -->
        <div class="switch-container">
          <button class="btn-link" id="switchToSignupBtn"><i class="fas fa-user-plus"></i> Créer un compte</button>
        </div>
        
        <div class="info-message" id="loginMessage" style="display: none;"></div>
      </div>

      <!-- formulaire d'inscription (caché initialement) -->
      <div id="signupForm" class="form-card hidden">
        <div class="input-group">
          <label><i class="fas fa-user"></i> Nom complet</label>
          <input type="text" class="input-field" id="signupName" placeholder="Dr. Sophie Martin">
        </div>
        <div class="input-group">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" class="input-field" id="signupEmail" placeholder="contact@domaine.com">
        </div>
        <div class="input-group">
          <label><i class="fas fa-phone-alt"></i> Téléphone (optionnel)</label>
          <input type="tel" class="input-field" id="signupPhone" placeholder="06 12 34 56 78">
        </div>
        <div class="input-group">
          <label><i class="fas fa-lock"></i> Mot de passe</label>
          <input type="password" class="input-field" id="signupPassword" placeholder="min. 8 caractères">
        </div>
        <div class="input-group">
          <label><i class="fas fa-check-circle"></i> Confirmer</label>
          <input type="password" class="input-field" id="signupConfirm" placeholder="identique">
        </div>
        <div class="checkbox-row">
          <label><input type="checkbox" id="acceptCgu"> J'accepte les conditions</label>
        </div>
        <button class="btn-primary" id="doSignupBtn"><i class="fas fa-check"></i> S'inscrire</button>
        
        <!-- Lien de retour vers connexion -->
        <div class="switch-container">
          <button class="btn-link" id="switchToLoginBtn"><i class="fas fa-arrow-left"></i> Retour à la connexion</button>
        </div>
        
        <div class="info-message" id="signupMessage" style="display: none;"></div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ----- éléments DOM -----
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');
      
      // messages d'info
      const loginMsg = document.getElementById('loginMessage');
      const signupMsg = document.getElementById('signupMessage');

      // boutons de switch
      const switchToSignup = document.getElementById('switchToSignupBtn');
      const switchToLogin = document.getElementById('switchToLoginBtn');

      // actions principales
      const doLogin = document.getElementById('doLoginBtn');
      const doSignup = document.getElementById('doSignupBtn');

      // champs utiles
      const loginEmail = document.getElementById('loginEmail');
      const loginPass = document.getElementById('loginPassword');
      const signupName = document.getElementById('signupName');
      const signupEmail = document.getElementById('signupEmail');
      const signupPhone = document.getElementById('signupPhone');
      const signupPass = document.getElementById('signupPassword');
      const signupConfirm = document.getElementById('signupConfirm');
      const acceptCgu = document.getElementById('acceptCgu');

      // ----- fonctions utilitaires d'affichage -----
      function hideAllForms() {
        loginForm.classList.add('hidden');
        signupForm.classList.add('hidden');
      }

      function showLogin() {
        hideAllForms();
        loginForm.classList.remove('hidden');
        document.querySelector('.form-header h2').innerHTML = '<i class="fas fa-sign-in-alt"></i> Connexion';
        loginMsg.style.display = 'none';
      }

      function showSignup() {
        hideAllForms();
        signupForm.classList.remove('hidden');
        document.querySelector('.form-header h2').innerHTML = '<i class="fas fa-user-plus"></i> Créer un compte';
        signupMsg.style.display = 'none';
      }

      // ----- gestionnaires de navigation -----
      switchToSignup.addEventListener('click', (e) => {
        e.preventDefault();
        showSignup();
      });

      switchToLogin.addEventListener('click', (e) => {
        e.preventDefault();
        showLogin();
      });

      // ----- SIMULATION DES ACTIONS (démo) -----
      doLogin.addEventListener('click', (e) => {
        e.preventDefault();
        const email = loginEmail.value.trim();
        const pwd = loginPass.value.trim();
        if (!email || !pwd) {
          loginMsg.style.display = 'flex';
          loginMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Veuillez remplir tous les champs.';
          return;
        }
        loginMsg.style.display = 'flex';
        loginMsg.innerHTML = '<i class="fas fa-circle-check"></i> Connexion réussie (simulation). Redirection...';
        loginMsg.style.background = '#e1f7ed';
        loginMsg.style.color = '#13543e';
      });

      doSignup.addEventListener('click', (e) => {
        e.preventDefault();
        const name = signupName.value.trim();
        const email = signupEmail.value.trim();
        const pwd = signupPass.value.trim();
        const confirm = signupConfirm.value.trim();
        const cguOk = acceptCgu.checked;

        if (!name || !email || !pwd || !confirm) {
          signupMsg.style.display = 'flex';
          signupMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Tous les champs obligatoires doivent être remplis.';
          signupMsg.style.background = '#fff0f0';
          signupMsg.style.color = '#b33c3c';
          return;
        }
        if (pwd !== confirm) {
          signupMsg.style.display = 'flex';
          signupMsg.innerHTML = '<i class="fas fa-times-circle"></i> Les mots de passe ne correspondent pas.';
          return;
        }
        if (!cguOk) {
          signupMsg.style.display = 'flex';
          signupMsg.innerHTML = '<i class="fas fa-gavel"></i> Vous devez accepter les conditions.';
          return;
        }
        signupMsg.style.display = 'flex';
        signupMsg.innerHTML = '<i class="fas fa-check-circle"></i> Inscription réussie ! Redirection vers connexion...';
        signupMsg.style.background = '#dff0d8';
        signupMsg.style.color = '#2b5e2b';
        setTimeout(() => {
          showLogin();
          loginEmail.value = email;
        }, 1500);
      });

      // Initialisation
      showLogin();
    })();
  </script>
</body>
</html>
